name: CI Master

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-master-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  validate-test-and-analyze:
    name: Restore, Build, Test, Coverage, Sonar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install coverage tooling
        shell: bash
        run: |
          dotnet tool update --global dotnet-coverage --version 18.4.1 || \
          dotnet tool install --global dotnet-coverage --version 18.4.1

      - name: Install SonarScanner
        if: ${{ env.SONAR_TOKEN != '' }}
        shell: bash
        run: |
          dotnet tool update --global dotnet-sonarscanner --version 9.0.2 || \
          dotnet tool install --global dotnet-sonarscanner --version 9.0.2

      - name: Restore .NET packages
        run: dotnet restore HomeBudgetBackendGateway.sln

      - name: Make scanner script executable
        if: ${{ env.SONAR_TOKEN != '' }}
        run: chmod +x ./startsonar.sh

      - name: Start Sonar scan
        id: start-sonar
        if: ${{ env.SONAR_TOKEN != '' }}
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PULL_REQUEST_ID: ${{ github.event.pull_request.number }}
          PULL_REQUEST_SOURCE_BRANCH: ${{ github.head_ref }}
          PULL_REQUEST_TARGET_BRANCH: ${{ github.base_ref }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          COVERAGE_FILE: test-results/backend-gateway-coverage.xml
          SONAR_EXCLUSIONS: test-results/**
          SONAR_COVERAGE_EXCLUSIONS: "**/Test[s]/**/*"
        shell: bash
        run: ./startsonar.sh

      - name: Build solution
        run: dotnet build HomeBudgetBackendGateway.sln --no-restore --no-incremental

      - name: Run tests with coverage
        timeout-minutes: 15
        shell: bash
        run: |
          mkdir -p test-results
          dotnet-coverage collect "dotnet test HomeBudgetBackendGateway.sln --no-build --no-restore --logger trx --results-directory test-results" \
            -f xml \
            -o "test-results/backend-gateway-coverage.xml"

      - name: Upload CI diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: ci-test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 14

      - name: End Sonar scan
        if: ${{ always() && steps.start-sonar.outcome == 'success' }}
        shell: bash
        run: dotnet-sonarscanner end /d:sonar.token="${{ env.SONAR_TOKEN }}"
