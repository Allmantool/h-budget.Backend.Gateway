name: Release Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  deployments: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: homebudget-backend-gateway

jobs:
  verify-tag-source:
    name: Verify Tag Origin
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate tag is reachable from master
        id: validate
        shell: bash
        run: |
          git fetch origin master --depth=1

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/master"; then
            echo "::error::Tag ${GITHUB_REF_NAME} points to ${GITHUB_SHA}, which is not reachable from origin/master."
            exit 1
          fi

          echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Validated tag ${GITHUB_REF_NAME} on commit ${GITHUB_SHA}."

  validate-application-build:
    name: Validate Application Build
    runs-on: ubuntu-latest
    needs: verify-tag-source
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: |
            Directory.Packages.props
            **/*.csproj

      - name: Restore .NET packages
        run: dotnet restore HomeBudgetBackendGateway.sln

      - name: Build solution
        run: dotnet build HomeBudgetBackendGateway.sln --no-restore --no-incremental

  create-deployment:
    name: Create GitHub Deployment
    runs-on: ubuntu-latest
    needs:
      - verify-tag-source
      - validate-application-build
    outputs:
      deployment_id: ${{ steps.create.outputs.deployment_id }}
    steps:
      - name: Create deployment
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              auto_merge: false,
              required_contexts: [],
              environment: 'production',
              transient_environment: false,
              production_environment: true,
              description: `Deploying Docker image for tag ${context.ref.replace('refs/tags/', '')}`
            });

            core.setOutput('deployment_id', deployment.data.id.toString());

  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs:
      - verify-tag-source
      - validate-application-build
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build Docker image
        shell: bash
        run: |
          image_ref="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${{ needs.verify-tag-source.outputs.release_tag }}"
          echo "Building Docker image for tag: ${{ needs.verify-tag-source.outputs.release_tag }}"
          echo "Resolved image ref: ${image_ref}"
          docker build \
            --target final \
            --build-arg BUILD_VERSION="${{ needs.verify-tag-source.outputs.release_tag }}" \
            -t "${image_ref}" \
            .

      - name: Export Docker image
        shell: bash
        run: |
          mkdir -p docker-artifacts
          image_ref="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${{ needs.verify-tag-source.outputs.release_tag }}"
          docker save "${image_ref}" | gzip > docker-artifacts/docker-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v5
        with:
          name: docker-image-${{ needs.verify-tag-source.outputs.release_tag }}
          path: docker-artifacts/docker-image.tar.gz
          retention-days: 1
          if-no-files-found: error

  push-docker-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - verify-tag-source
      - create-deployment
      - build-docker-image
    outputs:
      image_digest: ${{ steps.push.outputs.image_digest }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v5
        with:
          name: docker-image-${{ needs.verify-tag-source.outputs.release_tag }}
          path: docker-artifacts

      - name: Load Docker image
        shell: bash
        run: |
          gunzip -c docker-artifacts/docker-image.tar.gz | docker load

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        id: push
        shell: bash
        run: |
          image_ref="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${{ needs.verify-tag-source.outputs.release_tag }}"
          docker push "${image_ref}"

          digest="$(docker image inspect "${image_ref}" --format '{{index .RepoDigests 0}}' | cut -d'@' -f2)"

          if [[ -z "${digest}" ]]; then
            echo "::error::Unable to determine pushed image digest for ${image_ref}."
            exit 1
          fi

          echo "image_digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Pushed digest: ${digest}"

  publish-release-metadata:
    name: Publish Release Metadata
    runs-on: ubuntu-latest
    needs:
      - verify-tag-source
      - push-docker-image
    steps:
      - name: Create release metadata
        shell: bash
        run: |
          mkdir -p release-artifacts
          image_ref="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${{ needs.verify-tag-source.outputs.release_tag }}"
          cat <<EOF > release-artifacts/release-metadata.txt
          release_tag=${{ needs.verify-tag-source.outputs.release_tag }}
          commit_sha=${GITHUB_SHA}
          docker_image=${image_ref}
          docker_digest=${{ needs.push-docker-image.outputs.image_digest }}
          source_ref=${GITHUB_REF}
          EOF

      - name: Upload release metadata
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ needs.verify-tag-source.outputs.release_tag }}
          path: release-artifacts/release-metadata.txt
          retention-days: 30
          if-no-files-found: error

  finalize-deployment:
    name: Finalize Deployment
    runs-on: ubuntu-latest
    if: ${{ always() && needs.create-deployment.result == 'success' }}
    needs:
      - verify-tag-source
      - create-deployment
      - push-docker-image
      - publish-release-metadata
    steps:
      - name: Set deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const releaseTag = '${{ needs.verify-tag-source.outputs.release_tag }}';
            const imageRef = `${process.env.DOCKERHUB_USERNAME}/${process.env.IMAGE_NAME}:${releaseTag}`;
            const imageDigest = '${{ needs.push-docker-image.outputs.image_digest }}';
            const pushResult = '${{ needs.push-docker-image.result }}';
            const metadataResult = '${{ needs.publish-release-metadata.result }}';

            const isSuccess = pushResult === 'success' && metadataResult === 'success';
            const state = isSuccess ? 'success' : 'failure';
            const description = isSuccess
              ? `Released ${releaseTag} as ${imageRef}@${imageDigest}`
              : `Release ${releaseTag} failed during ${pushResult !== 'success' ? 'docker push' : 'metadata publication'}`;

            const payload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number('${{ needs.create-deployment.outputs.deployment_id }}'),
              state,
              description
            };

            if (isSuccess) {
              payload.environment_url = `https://hub.docker.com/r/${process.env.DOCKERHUB_USERNAME}/${process.env.IMAGE_NAME}`;
            }

            await github.rest.repos.createDeploymentStatus(payload);
